<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Data Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e8eaf0;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  #header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: #181c27;
    border-bottom: 1px solid #2a2f42; flex-shrink: 0;
  }
  .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6c7cff 0%, #a78bfa 100%);
    border-radius: 7px; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 700; color: #fff;
  }
  .title { font-size: 14px; font-weight: 600; }
  .subtitle { font-size: 12px; color: #6b7280; margin-left: auto; }
  #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
  #chat {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: #2a2f42; border-radius: 2px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
    border: 1px solid #2a2f42; background: #1e2235;
  }
  .avatar.ai { color: #6c7cff; }
  .avatar.user { color: #a78bfa; }
  .bubble {
    background: #181c27; border: 1px solid #2a2f42;
    border-radius: 10px; padding: 10px 13px;
    font-size: 13px; line-height: 1.6;
    max-width: calc(100% - 42px); color: #d1d5db;
  }
  .msg.user .bubble { background: #1a1f35; border-color: #3b3f6e; color: #e8eaf0; }
  .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .thinking span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #6c7cff; animation: pulse 1.2s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,80%,100% { opacity:0.2; transform:scale(0.8); }
    40% { opacity:1; transform:scale(1); }
  }
  .sql-block {
    margin-top: 8px; background: #0a0d14;
    border: 1px solid #2a2f42; border-radius: 8px; overflow: hidden;
  }
  .sql-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; background: #111520; border-bottom: 1px solid #2a2f42;
  }
  .sql-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280; font-weight: 600; }
  .copy-btn { font-size: 11px; color: #6c7cff; cursor: pointer; background: none; border: none; padding: 0; }
  .copy-btn:hover { color: #a78bfa; }
  .sql-code {
    padding: 10px;
    font-family: 'SF Mono','Fira Code','Courier New',monospace;
    font-size: 12px; color: #93c5fd; white-space: pre-wrap; word-break: break-word; line-height: 1.6;
  }
  .toggle-btn {
    font-size: 11px; color: #6b7280; cursor: pointer;
    background: none; border: none; padding: 0; margin-top: 8px; display: block;
  }
  .toggle-btn:hover { color: #9ca3af; }
  .result-table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #2a2f42; margin-top: 6px; }
  .result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .result-table th {
    background: #111520; padding: 6px 10px; text-align: left;
    color: #6b7280; font-weight: 600; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #2a2f42;
  }
  .result-table td { padding: 7px 10px; border-bottom: 1px solid #1e2235; color: #d1d5db; }
  .result-table tr:last-child td { border-bottom: none; }
  .result-table tr:hover td { background: #1a1f35; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .chip {
    font-size: 11px; padding: 4px 9px;
    background: #1e2235; border: 1px solid #2a2f42;
    border-radius: 20px; color: #9ca3af; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .chip:hover { border-color: #6c7cff; color: #6c7cff; }
  #input-bar {
    padding: 10px 14px; background: #181c27;
    border-top: 1px solid #2a2f42;
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  #user-input {
    flex: 1; background: #0f1117; border: 1px solid #2a2f42;
    border-radius: 8px; color: #e8eaf0; font-size: 13px;
    padding: 8px 12px; resize: none; min-height: 38px; max-height: 100px;
    font-family: inherit; line-height: 1.5; transition: border-color 0.15s;
  }
  #user-input:focus { outline: none; border-color: #6c7cff; }
  #user-input::placeholder { color: #4b5563; }
  #send-btn {
    width: 36px; height: 36px; border-radius: 8px; border: none;
    background: #6c7cff; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
  }
  #send-btn:hover { background: #7c8dff; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: #2a2f42; cursor: not-allowed; }
  #notice { font-size: 10px; color: #374151; text-align: center; padding: 4px 0 6px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">AI</div>
  <div class="title">Data Assistant</div>
  <div id="status-dot"></div>
  <div class="subtitle">Powered by Claude</div>
</div>

<div id="chat">
  <div class="msg">
    <div class="avatar ai">AI</div>
    <div class="bubble">
      Hi! Ask me anything about your campaign data — I'll pull the numbers straight from your dashboard and give you a plain English answer.
      <div class="chip-row">
        <div class="chip" onclick="fillQ('What were total conversions by channel last month?')">Conversions by channel</div>
        <div class="chip" onclick="fillQ('Show me the top 5 campaigns by spend this quarter')">Top campaigns by spend</div>
        <div class="chip" onclick="fillQ('How has revenue trended week over week?')">Revenue trend WoW</div>
        <div class="chip" onclick="fillQ('Which campaigns had a CPC above $5?')">High CPC campaigns</div>
      </div>
    </div>
  </div>
</div>

<div id="input-bar">
  <textarea id="user-input" placeholder="Ask a question about your data…" rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()" title="Send">&#8593;</button>
</div>
<div id="notice">Connected to your BigQuery data</div>

<script>
var WORKER_URL = 'https://lookerchat.richard-ca2.workers.dev';
var chatHistory = [];

function fillQ(q) {
  var inp = document.getElementById('user-input');
  inp.value = q;
  autoResize(inp);
  inp.focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function scrollToBottom() {
  var chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function appendMsg(role, html) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'msg' + (role === 'user' ? ' user' : '');
  div.innerHTML = '<div class="avatar ' + (role === 'user' ? 'user' : 'ai') + '">'
    + (role === 'user' ? 'You' : 'AI') + '</div>'
    + '<div class="bubble">' + html + '</div>';
  chat.appendChild(div);
  scrollToBottom();
  return div.querySelector('.bubble');
}

function makeThinking() {
  return appendMsg('ai', '<div class="thinking"><span></span><span></span><span></span></div>');
}

function formatValue(val) {
  if (val === null || val === undefined) return '-';
  var num = parseFloat(val);
  if (!isNaN(num) && val !== '') {
    if (num > 1000) return num.toLocaleString('en-US', {maximumFractionDigits: 0});
    return num.toLocaleString('en-US', {maximumFractionDigits: 2});
  }
  return val;
}

function toggleEl(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  var isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  var label = btn.textContent.replace(' ▸','').replace(' ▾','');
  btn.textContent = label + (isHidden ? ' ▾' : ' ▸');
}

function copySQL(id) {
  var el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(function() {
    var btn = el.closest('.sql-block').querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  });
}

function buildResult(bubble, sql, summary, rows) {
  var safeSQL = sql.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var sqlId = 'sql-' + Date.now();
  var tableId = 'tbl-' + Date.now();
  var sqlWrapId = 'sqlwrap-' + Date.now();

  var tableHTML = '';
  if (rows && rows.length > 0) {
    var cols = Object.keys(rows[0]);
    var thead = cols.map(function(c) { return '<th>' + c + '</th>'; }).join('');
    var tbody = rows.map(function(r) {
      return '<tr>' + cols.map(function(c) { return '<td>' + formatValue(r[c]) + '</td>'; }).join('') + '</tr>';
    }).join('');
    tableHTML = '<button class="toggle-btn" onclick="toggleEl(\'' + tableId + '\', this)">Show ' + rows.length + ' rows ▸</button>'
      + '<div id="' + tableId + '" style="display:none;">'
      + '<div class="result-table-wrap"><table class="result-table"><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table></div>'
      + '</div>';
  } else if (rows) {
    tableHTML = '<div style="margin-top:8px; font-size:12px; color:#6b7280;">No results found.</div>';
  }

  bubble.innerHTML = '<div style="color:#e8eaf0; line-height:1.7; margin-bottom:8px;">' + summary + '</div>'
    + tableHTML
    + '<button class="toggle-btn" onclick="toggleEl(\'' + sqlWrapId + '\', this)" style="margin-top:6px;">Show SQL ▸</button>'
    + '<div id="' + sqlWrapId + '" style="display:none;">'
    + '<div class="sql-block"><div class="sql-header"><span class="sql-label">BigQuery SQL</span>'
    + '<button class="copy-btn" onclick="copySQL(\'' + sqlId + '\')">Copy</button></div>'
    + '<pre class="sql-code" id="' + sqlId + '">' + safeSQL + '</pre></div></div>'
    + '<div class="chip-row">'
    + '<div class="chip" onclick="fillQ(\'Break this down further by week\')">By week</div>'
    + '<div class="chip" onclick="fillQ(\'Compare to the previous period\')">Prior period</div>'
    + '<div class="chip" onclick="fillQ(\'Show as percentage of total\')">As % of total</div>'
    + '</div>';
  scrollToBottom();
}

function sendMessage() {
  var inp = document.getElementById('user-input');
  var q = inp.value.trim();
  if (!q) return;

  inp.value = '';
  autoResize(inp);
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', q.replace(/</g,'&lt;'));
  var thinkBubble = makeThinking();

  chatHistory.push({ role: 'user', content: q });

  fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: chatHistory.slice(-10) })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.error) throw new Error(data.error);
    chatHistory.push({ role: 'assistant', content: data.summary || data.explanation || '' });
    buildResult(thinkBubble, data.sql || '', data.summary || data.explanation || '', data.rows || []);
  })
  .catch(function(err) {
    thinkBubble.innerHTML = '<span style="color:#f87171;">Error: ' + err.message + '</span>';
  })
  .finally(function() {
    document.getElementById('send-btn').disabled = false;
  });
}
</script>
</body>
</html>
